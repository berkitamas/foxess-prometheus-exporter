name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: GOOS=linux GOARCH=amd64 go build -o foxess-exporter-linux-amd64 .
      - run: GOOS=linux GOARCH=arm64 go build -o foxess-exporter-linux-arm64 .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: foxess-exporter-*
