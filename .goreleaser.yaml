version: 2

builds:
  - id: foxess-prometheus-exporter
    binary: foxess-prometheus-exporter
    goos:
      - linux
    goarch:
      - amd64
      - arm64

kos:
  - build: foxess-prometheus-exporter
    repositories:
      - ghcr.io/berkitamas/foxess-prometheus-exporter
    bare: true
    tags:
      - "{{ .Tag }}"
      - latest

release:
  github:
    owner: berkitamas
    name: foxess-prometheus-exporter
